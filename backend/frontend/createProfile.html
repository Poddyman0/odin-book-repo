<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Create Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="createProfile.css">
  </head>
<body id="body-profile-create">
    <script src="createProfile.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
<header>

</header>
<div id="profile-container">
  <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">

    <div id="create-profile-title"><strong>Get started on Social Media App</strong></div>
    <div>Create an account to connect with friends, family and communities of people who share your interests.</div>
    <div class="form-group">
      <br>
      <div><strong>Profile Photo</strong></div>
      <label for="fileInput" class="upload-btn btn btn-primary">
        Upload profile photo
      </label>
      <input type="file" id="fileInput" name="image" accept="image/*" hidden/>
      <br>
      <br>
        <label for="create-profile-info"><strong>Profile Info</strong></label>
        <input type="text" class="form-control" id="create-profile-info" placeholder="Enter Profile Info" required>
        <br>
        <label for="create-profile-username"><strong>Username</strong></label>
        <input type="text" class="form-control" id="create-profile-username" placeholder="Enter Profile Username" required>
        <br>
        <label for="create-profile-email"><strong>Email</strong></label>
        <input type="text" class="form-control" id="create-profile-email" placeholder="Enter Profile Email" required>
        <br>
        <label for="create-profile-password"><strong>Password</strong></label>
        <input type="text" class="form-control" id="create-profile-password" placeholder="Enter Profile Password" required>
        <br>
        <p><strong>Add Users To Follow</strong></p>
        <div id="add-following-radio-container"></div>
        <br>
        <button id="submit" class="btn btn-primary btn-sign-up" type="submit">Upload</button>
      </div>
  </form>
</div>
<div id="responseFeedback"></div>
</body>
